name: CI-CD Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # ✅ SAFE: only check imports
      - name: Import Check
        run: |
          python -c "import src"

      # ✅ SAFE: basic validation test (NOT training)
      - name: Run Data Validation Test
        run: |
          python -c "from src.components.data_validation import DataValidation; print('Validation module OK')"

      # ✅ OPTIONAL: linting
      - name: Lint Code
        run: |
          pip install flake8
          flake8 src/